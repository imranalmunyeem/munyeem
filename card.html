  <script>
    (function () {
      try {
        var r = document.documentElement;
        r.setAttribute('data-theme', localStorage.getItem('theme') || 'light');
        r.setAttribute('data-accent', localStorage.getItem('accent') || 'emerald');
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
        document.documentElement.setAttribute('data-accent', 'emerald');
      }
    })();
  </script>

  <link rel="stylesheet" href="styles.css?v=14">

  <style>
    .card-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 1.25rem;
      gap: 1.25rem;
    }
    .biz-card {
      width: 100%;
      max-width: 420px;
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      padding: 2.25rem 2rem 2rem;
      text-align: center;
    }
    .biz-avatar {
      width: 96px;
      height: 96px;
      margin: 0 auto 1rem;
      padding: 3px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
    }
    .biz-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
    }
    .biz-name {
      font-size: 1.625rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--fg);
    }
    .biz-name em {
      font-family: var(--font-serif);
      font-style: italic;
      font-weight: 400;
      color: var(--accent);
    }
    .biz-role {
      font-size: 0.9375rem;
      color: var(--fg-muted);
      margin-top: 0.25rem;
    }
    .biz-org {
      font-size: 0.8438rem;
      color: var(--fg-dim);
      margin-bottom: 1.25rem;
    }
    .biz-actions {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }
    .biz-actions .btn {
      width: 100%;
      justify-content: center;
    }
    .biz-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.375rem;
      margin-bottom: 1.5rem;
    }
    .biz-links a {
      padding: 0.375rem 0.75rem;
      background: var(--bg-tint);
      border-radius: 999px;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--fg-muted);
      transition: all 0.2s ease;
    }
    .biz-links a:hover {
      color: var(--bg-raised);
      background: var(--accent);
    }
    .biz-qr {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }
    .biz-qr .qr-tile {
      background: #ffffff;
      border-radius: var(--radius-md);
      padding: 10px;
      line-height: 0;
      border: 1px solid var(--border);
    }
    .biz-qr .qr-tile svg {
      width: 148px;
      height: 148px;
    }
    .biz-qr p {
      font-size: 0.75rem;
      color: var(--fg-dim);
    }
    .card-back {
      font-size: 0.875rem;
      color: var(--fg-muted);
    }
    .card-back a {
      color: var(--accent);
    }
    .card-back a:hover {
      text-decoration: underline;
    }
  </style>
</head>
